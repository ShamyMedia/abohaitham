<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطعم أبو هيثم</title>

<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/menu.css">
<link rel="stylesheet" href="styles/mobile.css">

<script>
window.cart = [];
window.menuDataCache = null;
</script>

</head>

<body>

<header class="header">
    <button id="btn-lang">EN</button>
    <h1 id="site-title">مطعم أبو هيثم</h1>
</header>

<nav id="category-nav"></nav>

<main id="menu-container">
    <p>جاري التحميل...</p>
</main>

<div id="floating-cart" class="floating-cart" style="display:none;">
    <span id="cart-count">0</span>
    <span id="cart-total">0</span>
    <button id="btn-checkout">واتساب</button>
</div>

<div id="cart-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div id="cart-items-container"></div>
        <div id="modal-total-display"></div>
        <button onclick="closeCartModal()">إغلاق</button>
    </div>
</div>

<script src="scripts/app.js"></script>
<script src="scripts/cart.js"></script>
<script src="scripts/whatsapp.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>

</body>
</html>
